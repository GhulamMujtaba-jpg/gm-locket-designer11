<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official - Name Logo Editor Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Montserrat;
  text-align:center;
}

.header{
  padding:15px;
  font-size:26px;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
  font-weight:bold;
}

.controls{
  background:#1e1e1e;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}

input,select,button{
  padding:7px;
  border-radius:6px;
  border:none;
  font-weight:bold;
}

button{
  cursor:pointer;
  color:white;
}

.preview-area{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#1c1c1c;
  padding:10px;
  border-radius:15px;
}

.logo{
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.3s;
}

.text{
  font-weight:bold;
}
</style>
</head>
<body>

<div class="header">GM Official - Name Logo Editor Pro</div>

<div class="controls">

<input type="text" id="nameInput" placeholder="Enter Name">

<select id="fontSelect">
<option value="Playfair Display">Royal</option>
<option value="Cinzel">Luxury</option>
<option value="Great Vibes">Signature</option>
<option value="Montserrat">Modern</option>
</select>

<input type="color" id="textColor">

<label>Size</label>
<input type="range" id="sizeRange" min="20" max="80" value="40">

<label>Shadow</label>
<input type="color" id="shadowColor">

<label>Border</label>
<input type="color" id="borderColor">

<label>Border Size</label>
<input type="range" id="borderSize" min="0" max="10" value="0">

<select id="effectSelect">
<option value="none">Normal</option>
<option value="3d">3D Text</option>
<option value="neon">Neon</option>
<option value="glow">Glow</option>
<option value="gradient">Gradient</option>
</select>

<button style="background:#00c853;" onclick="generateOne()">Generate One</button>
<button style="background:#ff5e62;" onclick="generateMany()">Generate 50</button>
<button style="background:#2962ff;" onclick="randomFontMode()">Random Font Mode</button>
<button style="background:#ff9800;" onclick="clearAll()">Clear All</button>

</div>

<div class="preview-area" id="preview"></div>

<script>
const preview=document.getElementById("preview");
let fonts=["Playfair Display","Cinzel","Great Vibes","Montserrat"];

function saveSettings(){
  localStorage.setItem("name",nameInput.value);
}

function loadSettings(){
  nameInput.value=localStorage.getItem("name")||"GM Official";
}
loadSettings();

function createLogo(fontRandom=false){

  let card=document.createElement("div");
  card.className="card";

  let logo=document.createElement("div");
  logo.className="logo";

  let text=document.createElement("div");
  text.className="text";

  let name=nameInput.value||"GM";
  text.innerText=name;

  let font=fontRandom?fonts[Math.floor(Math.random()*fonts.length)]:fontSelect.value;
  text.style.fontFamily=font;
  text.style.fontSize=sizeRange.value+"px";
  text.style.color=textColor.value;

  // Border
  text.style.webkitTextStroke=borderSize.value+"px "+borderColor.value;

  // Shadow
  text.style.textShadow="2px 2px 10px "+shadowColor.value;

  let effect=effectSelect.value;

  if(effect==="3d"){
    text.style.textShadow="3px 3px 0 #999,6px 6px 0 #666,9px 9px 10px rgba(0,0,0,0.7)";
  }

  if(effect==="neon"){
    text.style.color="#fff";
    text.style.textShadow="0 0 5px "+textColor.value+
    ",0 0 10px "+textColor.value+
    ",0 0 20px "+textColor.value+
    ",0 0 40px "+textColor.value;
  }

  if(effect==="glow"){
    text.style.textShadow="0 0 20px "+textColor.value;
  }

  if(effect==="gradient"){
    text.style.background="linear-gradient(45deg, red, yellow, cyan)";
    text.style.webkitBackgroundClip="text";
    text.style.webkitTextFillColor="transparent";
  }

  logo.appendChild(text);
  card.appendChild(logo);

  let delBtn=document.createElement("button");
  delBtn.innerText="Delete";
  delBtn.style.background="#ff1744";
  delBtn.onclick=function(){ card.remove(); };
  card.appendChild(delBtn);

  return card;
}

function generateOne(){
  preview.appendChild(createLogo());
  saveSettings();
}

function generateMany(){
  preview.innerHTML="";
  for(let i=0;i<50;i++){
    preview.appendChild(createLogo());
  }
}

function randomFontMode(){
  preview.innerHTML="";
  for(let i=0;i<50;i++){
    preview.appendChild(createLogo(true));
  }
}

function clearAll(){
  preview.innerHTML="";
}
</script>

</body>
</html>
