<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 500 Locket Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:'Montserrat',sans-serif;
  text-align:center;
  transition:0.3s;
}

.light-mode{
  background:#f5f5f5;
  color:#111;
}

.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
}

.controls{
  background:#222;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

input,select,button{
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

button{
  cursor:pointer;
  color:white;
}

.preview-area{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.design-card{
  background:#1c1c1c;
  padding:10px;
  border-radius:20px;
  position:relative;
}

.locket{
  width:150px;
  height:150px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

.text{
  z-index:2;
  font-weight:bold;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.download-btn{
  margin-top:8px;
  background:#00c853;
  width:100%;
}

.order-btn{
  margin-top:5px;
  background:#2962ff;
  width:100%;
}

.favorite{
  position:absolute;
  top:5px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>
<body>

<div class="header">GM Official – 500 Locket Designs</div>

<div class="controls">
  <input type="text" id="nameInput" placeholder="Enter Name">

  <select id="shapeSelect">
    <option value="circle">Circle</option>
    <option value="square">Square</option>
    <option value="heart">Heart</option>
    <option value="star">Star</option>
  </select>

  <select id="fontSelect">
    <option value="Playfair Display">Royal</option>
    <option value="Cinzel">Luxury</option>
    <option value="Great Vibes">Signature</option>
    <option value="Montserrat">Modern</option>
  </select>

  <label>Size</label>
  <input type="range" id="sizeRange" min="14" max="50" value="20">

  <label>Rotate</label>
  <input type="range" id="rotateRange" min="-180" max="180" value="0">

  <select id="styleSelect">
    <option value="none">Normal</option>
    <option value="uppercase">UPPERCASE</option>
    <option value="lowercase">lowercase</option>
    <option value="capitalize">Capitalize</option>
  </select>

  <input type="file" id="photoUpload" accept="image/*">

  <select id="bgStyle">
    <option value="normal">Normal</option>
    <option value="gold">Gold 3D</option>
    <option value="silver">Silver 3D</option>
    <option value="glass">Glass 3D</option>
  </select>

  <!-- NEW CONTROLS -->
  <input type="color" id="shadowColor">
  <input type="range" id="shadowBlur" min="0" max="30" value="10">
  <input type="color" id="borderColor">
  <input type="range" id="borderWidth" min="0" max="10" value="0">
  <button style="background:#ff9800;" onclick="toggleGlow()">Glow</button>
  <button style="background:#9c27b0;" onclick="randomMode()">Random Premium</button>
  <button style="background:#009688;" onclick="toggleMode()">Dark/Light</button>

  <button style="background:#ff5e62;" onclick="generate500()">Generate 500 Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<div style="margin:20px;">
  <button onclick="prevPage()">Previous</button>
  <button onclick="nextPage()">Next</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const previewArea=document.getElementById("previewArea");
let currentPage=1;
let designsPerPage=50;
let glowEnabled=false;

function randomColor(){
  const h=Math.floor(Math.random()*360);
  return `hsl(${h},70%,50%)`;
}

function toggleGlow(){
  glowEnabled=!glowEnabled;
  generate500();
}

function toggleMode(){
  document.body.classList.toggle("light-mode");
}

function randomMode(){
  document.getElementById("sizeRange").value=Math.floor(Math.random()*40)+14;
  document.getElementById("rotateRange").value=Math.floor(Math.random()*360)-180;
  generate500();
}

function createLocket(name,shape,font,photo,bgStyle){
  let card=document.createElement("div");
  card.className="design-card";

  let fav=document.createElement("div");
  fav.innerHTML="♡";
  fav.className="favorite";
  fav.onclick=function(){
    fav.innerHTML=fav.innerHTML==="♡"?"❤️":"♡";
  };
  card.appendChild(fav);

  let locket=document.createElement("div");
  locket.className="locket";

  locket.style.border=document.getElementById("borderWidth").value+"px solid "+document.getElementById("borderColor").value;

  if(glowEnabled){
    locket.style.boxShadow+=" ,0 0 20px gold";
  }

  if(photo){
    let img=document.createElement("img");
    img.src=photo;
    img.style.position="absolute";
    img.style.width="100%";
    img.style.height="100%";
    img.style.objectFit="cover";
    img.style.opacity="0.7";
    locket.appendChild(img);
  }

  let span=document.createElement("span");
  span.className="text";
  span.innerText=name;
  span.style.fontFamily=font;
  span.style.fontSize=document.getElementById("sizeRange").value+"px";
  span.style.transform="rotate("+document.getElementById("rotateRange").value+"deg)";
  span.style.textTransform=document.getElementById("styleSelect").value;
  span.style.color=randomColor();

  span.style.textShadow="0 0 "+document.getElementById("shadowBlur").value+"px "+document.getElementById("shadowColor").value;

  locket.appendChild(span);
  card.appendChild(locket);

  let downloadBtn=document.createElement("button");
  downloadBtn.innerText="Download";
  downloadBtn.className="download-btn";
  downloadBtn.onclick=function(){
    html2canvas(locket,{scale:3}).then(canvas=>{
      let link=document.createElement("a");
      link.download=name+"_Design.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  };
  card.appendChild(downloadBtn);

  let orderBtn=document.createElement("button");
  orderBtn.innerText="WhatsApp Order";
  orderBtn.className="order-btn";
  orderBtn.onclick=function(){
    window.open("https://wa.me/923000000000?text=I%20want%20this%20design");
  };
  card.appendChild(orderBtn);

  return card;
}

function generate500(){
  previewArea.innerHTML="";
  let name=document.getElementById("nameInput").value || "GM";
  let shape=document.getElementById("shapeSelect").value;
  let font=document.getElementById("fontSelect").value;
  let photo=document.getElementById("photoUpload").files[0] ? URL.createObjectURL(document.getElementById("photoUpload").files[0]) : null;
  let bgStyle=document.getElementById("bgStyle").value;

  let start=(currentPage-1)*designsPerPage;
  let end=start+designsPerPage;

  for(let i=start;i<end;i++){
    previewArea.appendChild(createLocket(name,shape,font,photo,bgStyle));
  }
}

function nextPage(){
  currentPage++;
  generate500();
}

function prevPage(){
  if(currentPage>1){
    currentPage--;
    generate500();
  }
}

generate500();
</script>

</body>
</html>
