<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Store – Max 3 Images</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* Same styles as before */
:root{
  --primary:#27ae60;
  --secondary:#f39c12;
  --bg-light:#f4f6f9;
  --bg-dark:#1e1e1e;
  --text-light:#000;
  --text-dark:#fff;
}
body{
  font-family:Arial,sans-serif;
  margin:0;
  background:var(--bg-light);
  color:var(--text-light);
  transition:.3s;
}
body.dark{
  background:var(--bg-dark);
  color:var(--text-dark);
}
header{
  background:#2c3e50;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
#darkToggle{padding:5px 12px;border:none;border-radius:5px;cursor:pointer;background:var(--primary);color:white;}
.container{max-width:1200px;margin:auto;padding:20px;}
input,button,select{padding:10px;margin:5px;border-radius:6px;border:none;}
button{background:var(--primary);color:white;cursor:pointer;}
button.delete{background:red;}
button.edit{background:var(--secondary);}
#dropArea{border:2px dashed var(--primary);border-radius:10px;padding:20px;text-align:center;color:var(--primary);cursor:pointer;}
#dropArea.dragover{background:rgba(39,174,96,0.1);}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px;}
.card{background:white;border-radius:10px;padding:10px;box-shadow:0 3px 10px rgba(0,0,0,.2);transition:.3s;overflow:hidden;}
body.dark .card{background:#2c2c2c;color:white;}
.card:hover{transform:scale(1.04);box-shadow:0 6px 20px rgba(0,0,0,.4);}
.card img.main-img{width:100%;height:180px;object-fit:cover;border-radius:6px;}
.thumb-slider{display:flex;justify-content:center;gap:5px;margin-top:5px;}
.thumb-slider img{width:50px;height:50px;border-radius:4px;cursor:pointer;border:2px solid transparent;}
.thumb-slider img.active{border-color:var(--primary);}
.price{font-size:18px;color:var(--primary);font-weight:bold;}
.old{text-decoration:line-through;color:red;}
@media(max-width:768px){.products{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}input,select,button{width:100%;}}
</style>
</head>
<body>

<header>
<h1>GM Store Pro</h1>
<button id="darkToggle" onclick="toggleDark()">Dark Mode</button>
</header>

<div class="container">

<div id="loginPanel">
<h2>Admin Login</h2>
<input type="text" id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="adminLogin()">Login</button>
</div>

<div id="adminDashboard" style="display:none;">
<h2>Add / Edit Product</h2>
<input id="pname" placeholder="Product Name">
<input type="number" id="price" placeholder="Price PKR">
<input type="number" id="discount" placeholder="Discount %">
<input type="number" id="stock" placeholder="Stock">
<input id="whatsapp" placeholder="WhatsApp Number">
<input id="category" placeholder="Category">

<div id="dropArea"><p>Drag & Drop Images Here or Click to Select (Max 3)</p>
<input type="file" id="images" multiple accept="image/*" style="display:none;">
</div>

<button id="addBtn" onclick="addProduct()">Add Product</button>
<button id="updateBtn" style="display:none" onclick="updateProduct()">Update Product</button>

<h2>Products</h2>
<div class="products" id="productList"></div>
</div>
</div>

<script>
// Dark Mode
function toggleDark(){document.body.classList.toggle('dark');document.getElementById('darkToggle').textContent=document.body.classList.contains('dark')?'Light Mode':'Dark Mode';}

// Admin Login
function adminLogin(){let u=document.getElementById("adminUser").value;let p=document.getElementById("adminPass").value;if(u==="admin"&&p==="admin"){document.getElementById("loginPanel").style.display="none";document.getElementById("adminDashboard").style.display="block";Swal.fire({icon:'success',title:'Welcome Admin',timer:1500,showConfirmButton:false});}else{Swal.fire({icon:'error',title:'Invalid Credentials'});}}

// Drag & Drop
const dropArea=document.getElementById("dropArea");const fileInput=document.getElementById("images");
dropArea.addEventListener('click',()=>fileInput.click());
dropArea.addEventListener('dragover',e=>{e.preventDefault();dropArea.classList.add('dragover');});
dropArea.addEventListener('dragleave',e=>{dropArea.classList.remove('dragover');});
dropArea.addEventListener('drop',e=>{e.preventDefault();dropArea.classList.remove('dragover');fileInput.files=e.dataTransfer.files;});

// Products
let products=JSON.parse(localStorage.getItem("products"))||[];
let editIndex=null;

function save(){localStorage.setItem("products",JSON.stringify(products));}

function addProduct(){
let name=document.getElementById("pname").value.trim();
let price=Number(document.getElementById("price").value);
let discount=Number(document.getElementById("discount").value)||0;
let stock=document.getElementById("stock").value||0;
let whatsapp=document.getElementById("whatsapp").value.trim();
let category=document.getElementById("category").value.trim();
let files=fileInput.files;
if(!name||!price||!whatsapp||files.length==0){Swal.fire({icon:'error',title:'Fill all fields'});return;}
if(files.length>3){Swal.fire({icon:'error',title:'Max 3 images allowed'}); return;}

let promises=[];
for(let i=0;i<files.length;i++){
let reader=new FileReader();
promises.push(new Promise(resolve=>{reader.onload=e=>resolve(e.target.result);reader.readAsDataURL(files[i]);}));
}

Promise.all(promises).then(images=>{
products.push({name,price,discount,stock,whatsapp,category,images});
save(); renderProducts(); clearForm();Swal.fire({icon:'success',title:'Product Added',timer:1200,showConfirmButton:false});
});
}

function clearForm(){document.getElementById("pname").value="";document.getElementById("price").value="";document.getElementById("discount").value="";document.getElementById("stock").value="";document.getElementById("whatsapp").value="";document.getElementById("category").value="";fileInput.value="";editIndex=null;document.getElementById("updateBtn").style.display="none";document.getElementById("addBtn").style.display="inline-block";}

function renderProducts(){
let list=document.getElementById("productList");list.innerHTML="";
products.forEach((p,i)=>{
let final=(p.price-(p.price*p.discount/100)).toFixed(0);
let card=document.createElement("div");card.className="card";
card.innerHTML=`<img src="${p.images[0]}" class="main-img" id="mainImg${i}"><h3>${p.name}</h3><div>Category: ${p.category}</div><div class="old">PKR ${p.price}</div><div class="price">PKR ${final}</div><div>Stock: ${p.stock}</div><div class="thumb-slider" id="slider${i}"></div><button onclick="orderProduct(${i})">Order WhatsApp</button><button onclick="editProduct(${i})" class="edit">Edit</button><button onclick="deleteProduct(${i})" class="delete">Delete</button>`;
list.appendChild(card);
let slider=document.getElementById(`slider${i}`);
p.images.forEach((img,j)=>{
let thumb=document.createElement("img");thumb.src=img;if(j==0)thumb.classList.add("active");
thumb.onclick=()=>{document.getElementById(`mainImg${i}`).src=img;Array.from(slider.children).forEach(x=>x.classList.remove("active"));thumb.classList.add("active");};
slider.appendChild(thumb);
});
});
}

function orderProduct(i){let p=products[i];let final=(p.price-(p.price*p.discount/100)).toFixed(0);window.open(`https://wa.me/${p.whatsapp}?text=I want to order ${p.name} for PKR ${final}`);}
function deleteProduct(i){Swal.fire({title:'Delete Product?',icon:'warning',showCancelButton:true,confirmButtonText:'Yes'}).then(result=>{if(result.isConfirmed){products.splice(i,1);save();renderProducts();Swal.fire({icon:'success',title:'Deleted',timer:1000,showConfirmButton:false});}});}
function editProduct(i){let p=products[i];document.getElementById("pname").value=p.name;document.getElementById("price").value=p.price;document.getElementById("discount").value=p.discount;document.getElementById("stock").value=p.stock;document.getElementById("whatsapp").value=p.whatsapp;document.getElementById("category").value=p.category;editIndex=i;document.getElementById("updateBtn").style.display="inline-block";document.getElementById("addBtn").style.display="none";}
function updateProduct(){if(editIndex===null)return;let i=editIndex;let name=document.getElementById("pname").value;let price=Number(document.getElementById("price").value);let discount=Number(document.getElementById("discount").value)||0;let stock=document.getElementById("stock").value||0;let whatsapp=document.getElementById("whatsapp").value;let category=document.getElementById("category").value;let files=fileInput.files;if(files.length>0){let images=[];let loaded=0;for(let j=0;j<files.length;j++){let reader=new FileReader();reader.onload=e=>{images.push(e.target.result);loaded++;if(loaded==files.length){products[i]={name,price,discount,stock,whatsapp,category,images};save();renderProducts();clearForm();Swal.fire({icon:'success',title:'Product Updated',timer:1200,showConfirmButton:false});}};reader.readAsDataURL(files[j]);}}else{products[i]={...products[i],name,price,discount,stock,whatsapp,category};save();renderProducts();clearForm();Swal.fire({icon:'success',title:'Product Updated',timer:1200,showConfirmButton:false});}}

renderProducts();
</script>
</body>
</html>
