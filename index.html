<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official Pro Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:'Montserrat',sans-serif;
  text-align:center;
}

.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
}

.controls{
  background:#222;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

input,select,button{
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

button{
  cursor:pointer;
  color:white;
}

.preview-area{
  margin-top:20px;
  display:flex;
  justify-content:center;
  padding:20px;
}

.design-card{
  background:#1c1c1c;
  padding:20px;
  border-radius:20px;
}

.locket{
  width:250px;
  height:250px;
  border-radius:50%;
  background:linear-gradient(145deg,#d4af37,#f9e79f,#b8860b);
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.8);
}

.text{
  position:absolute;
  cursor:move;
  font-weight:bold;
}

.watermark{
  position:absolute;
  bottom:5px;
  font-size:10px;
  opacity:0.5;
}

.shine{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.4),transparent 60%);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

.price-box{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">GM Official – Professional Designer</div>

<div class="controls">
<input type="text" id="topName" placeholder="Top Name">
<input type="text" id="bottomName" placeholder="Bottom Name">

<select id="iconSelect">
<option value="">No Icon</option>
<option value="❤️">Heart</option>
<option value="👑">Crown</option>
<option value="⭐">Star</option>
<option value="💍">Ring</option>
</select>

<select id="curveSelect">
<option value="none">Normal Text</option>
<option value="top">Curve Top</option>
<option value="bottom">Curve Bottom</option>
</select>

<select id="materialSelect">
<option value="gold">Gold</option>
<option value="silver">Silver</option>
</select>

<input type="range" id="sizeSelect" min="20" max="60" value="30">

<label>
<input type="checkbox" id="watermarkToggle" checked> Watermark
</label>

<button style="background:#ff5e62;" onclick="updateDesign()">Update Design</button>
</div>

<div class="preview-area">
<div class="design-card">

<div class="locket" id="locket">
<div class="shine"></div>
<div class="text" id="topText"></div>
<div class="text" id="bottomText"></div>
<div class="text" id="iconText"></div>
<div class="watermark" id="watermark">GM Official</div>
</div>

<div class="price-box" id="priceBox">Price: 1500 PKR</div>

</div>
</div>

<script>
const locket=document.getElementById("locket");
const topText=document.getElementById("topText");
const bottomText=document.getElementById("bottomText");
const iconText=document.getElementById("iconText");

function updateDesign(){

let topName=document.getElementById("topName").value;
let bottomName=document.getElementById("bottomName").value;
let icon=document.getElementById("iconSelect").value;
let curve=document.getElementById("curveSelect").value;
let material=document.getElementById("materialSelect").value;
let size=document.getElementById("sizeSelect").value;
let watermark=document.getElementById("watermarkToggle").checked;

topText.innerText=topName;
bottomText.innerText=bottomName;
iconText.innerText=icon;

topText.style.fontSize=size+"px";
bottomText.style.fontSize=size+"px";
iconText.style.fontSize=size+"px";

if(curve==="top"){
topText.style.top="20px";
topText.style.transform="rotate(-20deg)";
}
else{
topText.style.top="50px";
topText.style.transform="none";
}

if(curve==="bottom"){
bottomText.style.bottom="20px";
bottomText.style.transform="rotate(20deg)";
}
else{
bottomText.style.bottom="50px";
bottomText.style.transform="none";
}

iconText.style.top="50%";
iconText.style.left="50%";
iconText.style.transform="translate(-50%,-50%)";

if(material==="gold"){
locket.style.background="linear-gradient(145deg,#d4af37,#f9e79f,#b8860b)";
document.getElementById("priceBox").innerText="Price: 2500 PKR";
}
else{
locket.style.background="linear-gradient(145deg,#c0c0c0,#f0f0f0,#999)";
document.getElementById("priceBox").innerText="Price: 1800 PKR";
}

document.getElementById("watermark").style.display=watermark?"block":"none";
}

updateDesign();

/* Drag & Drop */
function dragElement(el){
let pos1=0,pos2=0,pos3=0,pos4=0;
el.onmousedown=dragMouseDown;

function dragMouseDown(e){
e.preventDefault();
pos3=e.clientX;
pos4=e.clientY;
document.onmouseup=closeDrag;
document.onmousemove=elementDrag;
}

function elementDrag(e){
e.preventDefault();
pos1=pos3-e.clientX;
pos2=pos4-e.clientY;
pos3=e.clientX;
pos4=e.clientY;
el.style.top=(el.offsetTop-pos2)+"px";
el.style.left=(el.offsetLeft-pos1)+"px";
}

function closeDrag(){
document.onmouseup=null;
document.onmousemove=null;
}
}

dragElement(topText);
dragElement(bottomText);
dragElement(iconText);

</script>

</body>
</html>
