<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 500 Locket Designs</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:'Montserrat',sans-serif;
  text-align:center;
}
.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
}
.controls{
  background:#222;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}
input,select,button{
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
button{ cursor:pointer; color:white; }

.preview-area{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}
.design-card{
  background:#1c1c1c;
  padding:10px;
  border-radius:20px;
}
.locket{
  width:150px;
  height:150px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}
.text{
  z-index:2;
  font-weight:bold;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}
.download-btn{ margin-top:8px; background:#00c853; width:100%; }
.order-btn{ margin-top:5px; background:#2962ff; width:100%; }
</style>
</head>
<body>

<div class="header">GM Official – 500 Locket Designs</div>

<div class="controls">

<input type="text" id="nameInput" placeholder="Enter Name">

<select id="shapeSelect">
<option value="circle">Circle</option>
<option value="square">Square</option>
<option value="diamond">Diamond</option>
<option value="star">Star</option>
<option value="heart">Heart</option>
</select>

<select id="fontSelect">
<option value="'Playfair Display'">Playfair</option>
<option value="'Cinzel'">Cinzel</option>
<option value="'Great Vibes'">Great Vibes</option>
<option value="'Montserrat'">Montserrat</option>
</select>

<select id="bgStyle">
<option value="gold">Gold</option>
<option value="silver">Silver</option>
<option value="glass">Glass</option>
<option value="neon">Neon</option>
<option value="random">Random</option>
</select>

<label>Size</label>
<input type="range" id="sizeRange" min="14" max="50" value="20">

<label>Rotate</label>
<input type="range" id="rotateRange" min="-180" max="180" value="0">

<select id="styleSelect">
<option value="none">Normal</option>
<option value="uppercase">UPPERCASE</option>
<option value="lowercase">lowercase</option>
<option value="capitalize">Capitalize</option>
</select>

<input type="file" id="photoUpload" accept="image/*">

</div>

<div class="preview-area" id="previewArea"></div>

<script>

function randomColor(){
  return "#" + Math.floor(Math.random()*16777215).toString(16);
}

function applyShape(locket,shape){
  locket.style.borderRadius="0";
  locket.style.clipPath="";

  if(shape==="circle") locket.style.borderRadius="50%";
  else if(shape==="square") locket.style.borderRadius="0";
  else if(shape==="diamond") locket.style.clipPath="polygon(50% 0%,100% 50%,50% 100%,0% 50%)";
  else if(shape==="star") locket.style.clipPath="polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)";
  else if(shape==="heart") locket.style.clipPath="polygon(50% 90%,90% 50%,75% 20%,50% 35%,25% 20%,10% 50%)";
}

function apply3D(locket,style){
  if(style==="gold"){
    locket.style.background="linear-gradient(145deg,#FFD700,#b8860b)";
    locket.style.boxShadow="0 0 20px gold";
  }
  else if(style==="silver"){
    locket.style.background="linear-gradient(145deg,#eee,#999)";
    locket.style.boxShadow="0 0 20px silver";
  }
  else if(style==="glass"){
    locket.style.background="rgba(255,255,255,0.2)";
    locket.style.boxShadow="0 0 20px white";
  }
  else if(style==="neon"){
    locket.style.background="#111";
    locket.style.boxShadow="0 0 25px cyan";
  }
  else{
    locket.style.background=randomColor();
    locket.style.boxShadow="none";
  }
}

function createLocket(name,shape,font,photo,bgStyle){
  let card=document.createElement("div");
  card.className="design-card";

  let locket=document.createElement("div");
  locket.className="locket";

  applyShape(locket,shape);
  apply3D(locket,bgStyle);

  if(photo){
    let img=document.createElement("img");
    img.src=photo;
    img.style.position="absolute";
    img.style.width="100%";
    img.style.height="100%";
    img.style.objectFit="cover";
    img.style.opacity="0.7";
    locket.appendChild(img);
  }

  let span=document.createElement("span");
  span.className="text";
  span.innerText=name;
  span.style.fontFamily=font;
  span.style.fontSize=document.getElementById("sizeRange").value+"px";
  span.style.transform="rotate("+document.getElementById("rotateRange").value+"deg)";
  span.style.textTransform=document.getElementById("styleSelect").value;
  span.style.color=randomColor();

  locket.appendChild(span);
  card.appendChild(locket);

  let downloadBtn=document.createElement("button");
  downloadBtn.innerText="Download";
  downloadBtn.className="download-btn";
  downloadBtn.onclick=function(){
    html2canvas(locket,{scale:3}).then(canvas=>{
      let link=document.createElement("a");
      link.download=name+"_Design.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  };
  card.appendChild(downloadBtn);

  return card;
}

function generate500(){
  let previewArea=document.getElementById("previewArea");
  previewArea.innerHTML="";

  let name=document.getElementById("nameInput").value || "GM";
  let shape=document.getElementById("shapeSelect").value;
  let font=document.getElementById("fontSelect").value;
  let photo=document.getElementById("photoUpload").files[0] ? URL.createObjectURL(document.getElementById("photoUpload").files[0]) : null;
  let bgStyle=document.getElementById("bgStyle").value;

  for(let i=0;i<20;i++){   /* 500 ki jagah 20 rakha for speed */
    previewArea.appendChild(createLocket(name,shape,font,photo,bgStyle));
  }
}

document.querySelectorAll("input,select").forEach(el=>{
  el.addEventListener("change",generate500);
  el.addEventListener("input",generate500);
});

generate500();

</script>
</body>
</html>
