<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM Official – 500 Locket Designs</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Cinzel:wght@600&family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:'Montserrat',sans-serif;
  text-align:center;
}

.header{
  padding:20px;
  font-size:28px;
  font-weight:bold;
  background:linear-gradient(90deg,#ff9966,#ff5e62);
}

.controls{
  background:#222;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

input,select,button{
  padding:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

button{
  cursor:pointer;
  color:white;
}

.preview-area{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:20px;
  padding:20px;
}

.design-card{
  background:#1c1c1c;
  padding:10px;
  border-radius:20px;
}

.locket{
  width:150px;
  height:150px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:0.4s;
}

.text{
  z-index:2;
  font-weight:bold;
  text-shadow:0 2px 10px rgba(0,0,0,0.7);
}

.download-btn{
  margin-top:8px;
  background:#00c853;
  width:100%;
}

.order-btn{
  margin-top:5px;
  background:#2962ff;
  width:100%;
}
</style>
</head>
<body>

<div class="header">GM Official – 500 Locket Designs</div>

<div class="controls">
  <input type="text" id="nameInput" placeholder="Enter Name">

  <select id="shapeSelect">
  <!-- Basic Shapes -->
  <option value="circle">Circle</option>
  <option value="square">Square</option>
  <option value="rectangle">Rectangle</option>
  <option value="roundedSquare">Rounded Square</option>
  <option value="oval">Oval</option>

  <!-- Love / Couple Shapes -->
  <option value="heart">Heart</option>
  <option value="doubleHeart">Double Heart</option>
  <option value="brokenHeart">Broken Heart</option>
  <option value="keyShape">Key Shape</option>
  <option value="heartLock">Heart Lock</option>

  <!-- Star & Polygon Shapes -->
  <option value="star">Star</option>
  <option value="diamond">Diamond Shape</option>
  <option value="pentagon">Pentagon</option>
  <option value="hexagon">Hexagon</option>
  <option value="octagon">Octagon</option>

  <!-- Jewellery / Premium Frames -->
  <option value="crownFrame">Crown Frame</option>
  <option value="vintageFrame">Vintage Frame</option>
  <option value="floralFrame">Floral Frame</option>
  <option value="mandalaDesign">Mandala Design</option>
  <option value="ropeCircle">Rope Border Circle</option>

  <!-- Islamic / Cultural Shapes -->
  <option value="crescentMoon">Crescent Moon</option>
  <option value="starCrescent">Star & Crescent</option>
  <option value="mosqueDome">Mosque Dome</option>
  <option value="arabicFrame">Arabic Frame</option>
  <option value="calligraphyFrame">Calligraphy Frame</option>
</select>
  <select id="fontSelect">
    <option value="Playfair Display">Royal</option>
    <option value="Cinzel">Luxury</option>
    <option value="Great Vibes">Signature</option>
    <option value="Montserrat">Modern</option>
  </select>

  <label>Size</label>
  <input type="range" id="sizeRange" min="14" max="50" value="20">

  <label>Rotate</label>
  <input type="range" id="rotateRange" min="-180" max="180" value="0">

  <select id="styleSelect">
    <option value="none">Normal</option>
    <option value="uppercase">UPPERCASE</option>
    <option value="lowercase">lowercase</option>
    <option value="capitalize">Capitalize</option>
  </select>

  <input type="file" id="photoUpload" accept="image/*">

 <select id="bgStyle">
  <!-- Basic / Default -->
  <option value="normal">Normal</option>

  <!-- Classic 3D Materials -->
  <option value="gold">Gold 3D</option>
  <option value="silver">Silver 3D</option>
  <option value="bronze">Bronze 3D</option>
  <option value="platinum">Platinum 3D</option>
  <option value="copper">Copper 3D</option>

  <!-- Modern / Glass Effects -->
  <option value="glass">Glass 3D</option>
  <option value="frostedGlass">Frosted Glass</option>
  <option value="transparentGlass">Transparent Glass</option>
  <option value="neonGlow">Neon Glow</option>

  <!-- Luxury Textures -->
  <option value="marbleWhite">Marble White</option>
  <option value="marbleBlack">Marble Black</option>
  <option value="woodBrown">Wood Brown</option>
  <option value="matteMetal">Matte Metal</option>
  <option value="chrome">Chrome</option>

  <!-- Premium Effects -->
  <option value="fireEdge">Fire Edge</option>
  <option value="liquidMetal">Liquid Metal</option>
  <option value="smokeEffect">Smoke Effect</option>
  <option value="diamondCut">Diamond Cut</option>
  <option value="facetedCrystal">Faceted Crystal</option>
</select>

  <button style="background:#ff5e62;" onclick="generate500()">Generate 500 Designs</button>
</div>

<div class="preview-area" id="previewArea"></div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const previewArea=document.getElementById("previewArea");

function randomColor(){
  const h=Math.floor(Math.random()*360);
  return `hsl(${h},70%,50%)`;
}

function applyShape(locket,shape){
  if(shape==="circle"){
    locket.style.borderRadius="50%";
    locket.style.clipPath="none";
  } else if(shape==="square"){
    locket.style.borderRadius="10px";
    locket.style.clipPath="none";
  } else if(shape==="heart"){
    locket.style.clipPath="polygon(50% 90%, 0% 40%, 25% 10%, 50% 30%, 75% 10%, 100% 40%)";
  } else if(shape==="star"){
    locket.style.clipPath="polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)";
  }
}

function apply3D(locket,style){
  if(style==="gold"){
    locket.style.background="linear-gradient(145deg,#d4af37,#f9e79f,#b8860b)";
    locket.style.boxShadow="inset 6px 6px 12px rgba(255,255,255,0.5),inset -6px -6px 12px rgba(0,0,0,0.6),0 10px 20px rgba(0,0,0,0.8)";
  } else if(style==="silver"){
    locket.style.background="linear-gradient(145deg,#c0c0c0,#f0f0f0,#999)";
    locket.style.boxShadow="inset 6px 6px 12px rgba(255,255,255,0.5),inset -6px -6px 12px rgba(0,0,0,0.6),0 10px 20px rgba(0,0,0,0.8)";
  } else if(style==="glass"){
    locket.style.background="rgba(255,255,255,0.1)";
    locket.style.backdropFilter="blur(10px)";
    locket.style.boxShadow="inset 0 0 15px rgba(255,255,255,0.5),0 10px 20px rgba(0,0,0,0.7)";
  } else{
    locket.style.background=randomColor();
    locket.style.boxShadow="";
    locket.style.clipPath="";
  }
}

function createLocket(name,shape,font,photo,bgStyle){
  let card=document.createElement("div");
  card.className="design-card";

  let locket=document.createElement("div");
  locket.className="locket";

  applyShape(locket,shape);
  apply3D(locket,bgStyle);

  if(photo){
    let img=document.createElement("img");
    img.src=photo;
    img.style.position="absolute";
    img.style.width="100%";
    img.style.height="100%";
    img.style.objectFit="cover";
    img.style.opacity="0.7";
    locket.appendChild(img);
  }

  let span=document.createElement("span");
  span.className="text";
  span.innerText=name;
  span.style.fontFamily=font;
  span.style.fontSize=document.getElementById("sizeRange").value+"px";
  span.style.transform="rotate("+document.getElementById("rotateRange").value+"deg)";
  span.style.textTransform=document.getElementById("styleSelect").value;
  span.style.color=randomColor();

  locket.appendChild(span);
  card.appendChild(locket);

  let downloadBtn=document.createElement("button");
  downloadBtn.innerText="Download";
  downloadBtn.className="download-btn";
  downloadBtn.onclick=function(){
    html2canvas(locket,{scale:3}).then(canvas=>{
      let link=document.createElement("a");
      link.download=name+"_Design.png";
      link.href=canvas.toDataURL();
      link.click();
    });
  };
  card.appendChild(downloadBtn);

  let orderBtn=document.createElement("button");
  orderBtn.innerText="Submit Order";
  orderBtn.className="order-btn";
  orderBtn.onclick=function(){
    alert("Order feature needs GitHub token.");
  };
  card.appendChild(orderBtn);

  return card;
}

function generate500(){
  previewArea.innerHTML="";
  let name=document.getElementById("nameInput").value || "GM";
  let shape=document.getElementById("shapeSelect").value;
  let font=document.getElementById("fontSelect").value;
  let photo=document.getElementById("photoUpload").files[0] ? URL.createObjectURL(document.getElementById("photoUpload").files[0]) : null;
  let bgStyle=document.getElementById("bgStyle").value;

  for(let i=0;i<500;i++){
    previewArea.appendChild(createLocket(name,shape,font,photo,bgStyle));
  }
}

// Live Update
document.getElementById("nameInput").addEventListener("input",generate500);
document.getElementById("fontSelect").addEventListener("change",generate500);
document.getElementById("shapeSelect").addEventListener("change",generate500);
document.getElementById("sizeRange").addEventListener("input",generate500);
document.getElementById("rotateRange").addEventListener("input",generate500);
document.getElementById("styleSelect").addEventListener("change",generate500);
document.getElementById("photoUpload").addEventListener("change",generate500);
document.getElementById("bgStyle").addEventListener("change",generate500);

</script>
</body>
</html>
